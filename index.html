<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .btn {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        .header-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 200px;
            height: auto;
        }
    </style>
</head>

<body>

    <header class="header-container">
        <img src="logo.png" alt="Attendance System Logo" class="logo">
        <h1>Student Attendance System</h1>
    </header>

    <h2>Add New Student</h2>
    <form action="/student" method="POST">
        <input type="text" name="rollNo" placeholder="Roll No" required>
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="text" name="class" placeholder="Class" required>
        <button type="submit" class="btn">Add Student</button>
    </form>

    <hr>

    <h2>Attendance Sheet - <%= today %>
    </h2>
    <form action="/attendance" method="POST">
        <input type="hidden" name="date" value="<%= today %>">
        <table>
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <% students.forEach(student=> { %>
                    <tr>
                        <td>
                            <%= student.rollNo %>
                        </td>
                        <td>
                            <%= student.name %>
                        </td>
                        <td>
                            <%= student.class %>
                        </td>
                        <td>
                            <label>
                                <input type="radio" name="status[<%= student._id %>]" value="Present" checked> Present
                            </label>
                            <label>
                                <input type="radio" name="status[<%= student._id %>]" value="Absent"> Absent
                            </label>
                        </td>
                    </tr>
                    <% }) %>
            </tbody>
        </table>
        <br>
        <button type="submit" class="btn">Submit Attendance</button>
    </form>

</body>

</html>
